version: '3.8'
services:
  api:
    build: .
    ports:
      - "5000:8080"
    environment:
      - TelegramBot__Token=${tokenbot}
      - TelegramBot__ChatId=${id}
      - CryptoApiSettings__CryptoApiKey=${apikey}
      - RedisConnection=redis:6379
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - crypto-net
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  crypto-net:
    driver: bridge